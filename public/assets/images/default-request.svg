<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="50%" style="stop-color:#e2eaf2"/>
      <stop offset="100%" style="stop-color:#d5e0ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00715D;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00715D;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="100" fill="url(#accent)"/>
  <circle cx="120" cy="300" r="80" fill="url(#accent)"/>
  <circle cx="400" cy="200" r="160" fill="url(#accent)"/>
  <!-- Heart in hands icon -->
  <g transform="translate(345,105)" opacity="0.22">
    <!-- Hands -->
    <path d="M5 90 C5 65, 25 50, 55 70 L55 110 C30 115, 5 105, 5 90Z" fill="#00715D"/>
    <path d="M105 90 C105 65, 85 50, 55 70 L55 110 C80 115, 105 105, 105 90Z" fill="#00715D"/>
    <!-- Heart -->
    <path d="M55 50 C55 30, 30 20, 30 42 C30 60, 55 80, 55 80 C55 80, 80 60, 80 42 C80 20, 55 30, 55 50Z" fill="#00715D"/>
  </g>
  <!-- Text -->
  <text x="400" y="275" text-anchor="middle" font-family="Raleway,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#00715D" opacity="0.4" letter-spacing="1.5">TIRANA SOLIDARE</text>
  <text x="400" y="301" text-anchor="middle" font-family="Raleway,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#5a8a7d" opacity="0.35" letter-spacing="0.5">Kërkesë për Ndihmë</text>
</svg>
