<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5f0"/>
      <stop offset="50%" style="stop-color:#d1ebe3"/>
      <stop offset="100%" style="stop-color:#c3e4d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00715D;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00715D;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="url(#accent)"/>
  <circle cx="150" cy="320" r="90" fill="url(#accent)"/>
  <circle cx="400" cy="200" r="180" fill="url(#accent)"/>
  <!-- Calendar icon -->
  <g transform="translate(340,120)" opacity="0.25">
    <rect x="0" y="16" width="120" height="110" rx="12" fill="none" stroke="#00715D" stroke-width="5"/>
    <line x1="0" y1="48" x2="120" y2="48" stroke="#00715D" stroke-width="5"/>
    <line x1="32" y1="0" x2="32" y2="32" stroke="#00715D" stroke-width="5" stroke-linecap="round"/>
    <line x1="88" y1="0" x2="88" y2="32" stroke="#00715D" stroke-width="5" stroke-linecap="round"/>
    <!-- People silhouettes -->
    <circle cx="35" cy="78" r="8" fill="#00715D"/>
    <path d="M22 100 a13 13 0 0 1 26 0" fill="#00715D"/>
    <circle cx="60" cy="72" r="10" fill="#00715D"/>
    <path d="M44 100 a16 16 0 0 1 32 0" fill="#00715D"/>
    <circle cx="85" cy="78" r="8" fill="#00715D"/>
    <path d="M72 100 a13 13 0 0 1 26 0" fill="#00715D"/>
  </g>
  <!-- Text -->
  <text x="400" y="290" text-anchor="middle" font-family="Raleway,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#00715D" opacity="0.4" letter-spacing="1.5">TIRANA SOLIDARE</text>
  <text x="400" y="316" text-anchor="middle" font-family="Raleway,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#5a8a7d" opacity="0.35" letter-spacing="0.5">Event</text>
</svg>
